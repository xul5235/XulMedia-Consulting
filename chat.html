<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Talk | XULMEDIA Intake</title>
    <meta name="description" content="Start a conversation with XULMEDIA & CONSULTING.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="canonical" href="https://www.xul.no/chat.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.xul.no/chat.html" />
    <link rel="alternate" hreflang="en" href="https://www.xul.no/chat.html?lang=en" />
    <link rel="alternate" hreflang="no" href="https://www.xul.no/chat.html?lang=no" />
    <link rel="alternate" hreflang="es" href="https://www.xul.no/chat.html?lang=es" />
</head>
<body class="chat-page">
    <header id="navbar" role="banner">
        <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">XULMEDIA&amp;CONSULTING</a></div>
        <nav id="main-nav" role="navigation" aria-label="Main Navigation">
            <ul>
                <li><a href="index.html" data-i18n="nav_back">Back to Main Site</a></li>
            </ul>
        </nav>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="en">EN</button>
            <span class="lang-sep">|</span>
            <button class="lang-btn" data-lang="no">NO</button>
            <span class="lang-sep">|</span>
            <button class="lang-btn" data-lang="es">ES</button>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="mobile-nav" id="mobile-nav" role="navigation" aria-label="Mobile Navigation">
        <ul>
            <li><a href="index.html" class="mobile-nav-link" data-i18n="nav_back">Back to Main Site</a></li>
        </ul>
        <div class="mobile-lang-switcher">
            <button class="lang-btn active" data-lang="en">EN</button>
            <span class="lang-sep">|</span>
            <button class="lang-btn" data-lang="no">NO</button>
            <span class="lang-sep">|</span>
            <button class="lang-btn" data-lang="es">ES</button>
        </div>
    </div>

    <main class="chat-main" role="main">
        <div class="chat-wrapper">
            <div class="chat-header">
                <h1 data-i18n="chat_title">Let's Talk.</h1>
                <p data-i18n="chat_sub">A quick intake to understand your brand before we speak directly.</p>
            </div>
            
            <div class="chat-window" id="chat-window">
                <!-- Messages will be injected here by chat.js -->
            </div>

            <div class="chat-controls" id="chat-controls">
                <!-- Interactive options/inputs injected here -->
            </div>
        </div>
    </main>

    <script src="translations.js"></script>
    <script src="script.js"></script>
    <script src="chat.js"></script>
</body>
</html>
